name: Bug 回報（中文）
description: 回報錯誤或非預期的行為
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 問題描述
      description: 請清楚描述遇到的問題。
      placeholder: 發生了什麼事？
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 重現步驟
      description: 要怎麼重現這個問題？
      placeholder: |
        1. 開啟 Spectra
        2. 前往「...」
        3. 點擊「...」
        4. 出現錯誤
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 預期行為
      description: 你原本預期會發生什麼？
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Spectra 版本
      description: 你使用的是哪個版本？
      placeholder: 例如 2.1.3
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 作業系統
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows (x64)
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截圖
      description: 如果有的話，請附上截圖或螢幕錄影。

  - type: textarea
    id: additional
    attributes:
      label: 其他補充
      description: 任何其他有助於理解問題的資訊。
